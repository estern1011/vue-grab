<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }
    
    h2 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #333;
    }
    
    p {
      margin: 0 0 16px 0;
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }
    
    button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    #toggleBtn {
      background: #42b883;
      color: white;
    }
    
    #toggleBtn:hover {
      background: #35a372;
    }
    
    #toggleBtn.active {
      background: #e74c3c;
    }
    
    #toggleBtn.active:hover {
      background: #c0392b;
    }

    #cursorBtn {
      background: #007ACC;
      color: white;
      margin-top: 8px;
    }

    #cursorBtn:hover {
      background: #005A9E;
    }

    #cursorBtn:disabled {
      background: #cccccc;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
    }
    
    .status.inactive {
      background: #f8f9fa;
      color: #666;
    }
    
    .status.active {
      background: #d4edda;
      color: #155724;
    }
    
    .keyboard-hint {
      margin-top: 12px;
      padding: 8px;
      background: #f8f9fa;
      border-radius: 4px;
      font-size: 11px;
      color: #666;
      text-align: center;
    }
  </style>
</head>
<body>
  <h2>🎯 Vue Grab</h2>
  <p>Click any Vue component on the page to extract its context for Claude Code.</p>

  <button id="toggleBtn">Start Grabbing</button>
  <button id="cursorBtn" style="display: none;">Send to Cursor Composer</button>

  <div id="status" class="status inactive">
    Click the button to activate
  </div>

  <div class="keyboard-hint">
    Press <strong>Esc</strong> to cancel
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
