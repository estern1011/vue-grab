<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      margin: 0;
    }

    h2 {
      margin: 0 0 12px 0;
      font-size: 16px;
      color: #333;
    }

    p {
      margin: 0 0 16px 0;
      font-size: 13px;
      color: #666;
      line-height: 1.5;
    }

    button {
      width: 100%;
      padding: 10px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    #toggleBtn {
      background: #42b883;
      color: white;
    }

    #toggleBtn:hover {
      background: #35a372;
    }

    #toggleBtn.active {
      background: #e74c3c;
    }

    #toggleBtn.active:hover {
      background: #c0392b;
    }

    .ide-section {
      margin-top: 12px;
      display: none;
    }

    .ide-section.visible {
      display: block;
    }

    .ide-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    #ideSelect {
      flex: 1;
      padding: 10px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: white;
      cursor: pointer;
    }

    #ideSelect:focus {
      outline: none;
      border-color: #42b883;
    }

    #openIdeBtn {
      width: auto;
      padding: 10px 16px;
      background: #007ACC;
      color: white;
      white-space: nowrap;
    }

    #openIdeBtn:hover {
      background: #005A9E;
    }

    #openIdeBtn:disabled {
      background: #cccccc;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
      text-align: center;
    }

    .status.inactive {
      background: #f8f9fa;
      color: #666;
    }

    .status.active {
      background: #d4edda;
      color: #155724;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
    }

    button:disabled {
      background: #cccccc !important;
      cursor: not-allowed;
    }

    .editor-section {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }

    .editor-section label {
      font-size: 12px;
      color: #666;
      white-space: nowrap;
    }

    .editor-section select {
      flex: 1;
    }

    .keyboard-hints {
      margin-top: 12px;
      padding: 10px;
      background: #f8f9fa;
      border-radius: 4px;
      font-size: 11px;
      color: #666;
    }

    .keyboard-hints .hint-title {
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }

    .keyboard-hints .hint-row {
      margin: 4px 0;
      display: flex;
      gap: 4px;
      align-items: center;
    }

    .keyboard-hints kbd {
      background: #e9ecef;
      padding: 2px 5px;
      border-radius: 3px;
      font-family: monospace;
      font-size: 10px;
      border: 1px solid #dee2e6;
    }
  </style>
  <script type="module" crossorigin src="/src/popup.js"></script>
</head>
<body>
  <h2>🎯 Vue Grab</h2>
  <p>Click any Vue component to extract its context for AI coding assistants.</p>

  <div class="editor-section">
    <label for="ideSelect">Default Editor:</label>
    <select id="ideSelect">
      <option value="cursor">Cursor</option>
      <option value="windsurf">Windsurf</option>
    </select>
  </div>

  <button id="toggleBtn">Start Grabbing</button>

  <div id="ideSection" class="ide-section">
    <button id="openIdeBtn">Open in Editor</button>
  </div>

  <div id="status" class="status inactive">
    Click the button to activate
  </div>

  <div class="keyboard-hints">
    <div class="hint-title">Keyboard Shortcuts</div>
    <div class="hint-row"><kbd>Click</kbd> Copy to clipboard</div>
    <div class="hint-row"><kbd>⌘+Click</kbd> / <kbd>Ctrl+Click</kbd> Copy + Open editor</div>
    <div class="hint-row"><kbd>Enter</kbd> Copy highlighted component</div>
    <div class="hint-row"><kbd>⌥↑↓</kbd> / <kbd>Alt+↑↓</kbd> Navigate hierarchy</div>
    <div class="hint-row"><kbd>Esc</kbd> Cancel</div>
  </div>

</body>
</html>
